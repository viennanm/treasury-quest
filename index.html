<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />

<title>Treasury Quest – Interactive Treasury Game</title>
<style>
:root{--bg:#07111f;--panel:#0f1b2d;--line:rgba(255,255,255,.12);--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--cyan:#06b6d4;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--violet:#8b5cf6;--shadow:0 20px 50px rgba(0,0,0,.35);--radius:20px}
*{box-sizing:border-box} body{margin:0;font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0%,rgba(37,99,235,.35),transparent 34%),radial-gradient(circle at 90% 20%,rgba(6,182,212,.18),transparent 26%),radial-gradient(circle at 40% 100%,rgba(139,92,246,.20),transparent 30%),var(--bg);min-height:100vh}
header{max-width:1260px;margin:0 auto;padding:26px 22px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px} h1{margin:0 0 8px;font-size:clamp(32px,5vw,54px);letter-spacing:-.055em;line-height:1} .subtitle{margin:0;color:#cbd5e1;max-width:820px;line-height:1.48} .brandbox{min-width:260px;border:1px solid var(--line);border-radius:18px;padding:14px 16px;background:rgba(255,255,255,.07);box-shadow:var(--shadow)} .brandbox strong{display:block;font-size:17px} .brandbox span{display:block;margin-top:4px;color:#cbd5e1;font-size:13px;line-height:1.4}
.toolbar{max-width:1260px;margin:0 auto;padding:0 22px 14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center} .selectwrap{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);padding:8px 10px;color:#cbd5e1;font-size:13px} select{border:0;color:white;background:#17233a;border-radius:10px;padding:8px 10px;font-weight:700;outline:none}
main{max-width:1260px;margin:0 auto;padding:0 22px 34px;display:grid;grid-template-columns:1.35fr .85fr;gap:18px} .panel{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:rgba(15,27,45,.78);box-shadow:var(--shadow);backdrop-filter:blur(10px)} .panel-header{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center;background:rgba(255,255,255,.035)} .panel-header h2,.panel-header h3{margin:0;letter-spacing:-.025em} .small{color:var(--muted);font-size:12.5px;line-height:1.35} .panel-body{padding:18px 20px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px} .kpi{padding:13px;min-height:118px;border-radius:17px;background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.035));border:1px solid var(--line)} .kpi label{display:block;color:#cbd5e1;font-size:11px;text-transform:uppercase;letter-spacing:.055em;margin-bottom:8px} .kpi .value{font-size:23px;font-weight:850;letter-spacing:-.035em;margin-bottom:8px} .bar{height:8px;background:rgba(255,255,255,.09);border-radius:99px;overflow:hidden} .fill{height:100%;width:50%;border-radius:99px;transition:width .45s ease,background .45s ease}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px} .chartcard{min-height:278px;padding:14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.045)} .charttitle{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;font-weight:800} canvas{width:100%;height:220px;display:block} .pill{display:inline-flex;align-items:center;border:1px solid var(--line);color:#dbeafe;background:rgba(255,255,255,.075);border-radius:999px;padding:5px 9px;font-size:12px}
.scenario{border:1px solid rgba(125,211,252,.24);border-radius:20px;padding:17px;background:linear-gradient(135deg,rgba(37,99,235,.22),rgba(6,182,212,.07));margin-bottom:14px} .tag{display:inline-flex;font-size:12px;color:#bae6fd;background:rgba(14,165,233,.14);border:1px solid rgba(125,211,252,.20);border-radius:999px;padding:6px 10px;margin-bottom:12px} .scenario h3{margin:0 0 8px;font-size:22px;letter-spacing:-.03em} .scenario p{margin:0;color:#dbeafe;line-height:1.48}
.choices{display:grid;gap:10px} .choice{width:100%;text-align:left;cursor:pointer;color:var(--text);border:1px solid var(--line);border-radius:16px;padding:14px;background:rgba(255,255,255,.06);transition:.18s ease} .choice:hover{transform:translateY(-1px);border-color:rgba(125,211,252,.55);background:rgba(37,99,235,.18)} .choice:disabled{opacity:.72;cursor:default;transform:none} .choice b{display:block;font-size:15px;margin-bottom:5px} .choice span{color:#cbd5e1;font-size:13px;line-height:1.38} .impact{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px} .impact .good{border-color:rgba(34,197,94,.3);color:#bbf7d0;background:rgba(34,197,94,.11)} .impact .bad{border-color:rgba(239,68,68,.3);color:#fecaca;background:rgba(239,68,68,.11)}
button.action{border:0;border-radius:13px;padding:12px 14px;font-weight:800;color:white;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--cyan));transition:.18s ease} button.action.secondary{background:rgba(255,255,255,.10);border:1px solid var(--line)} button.action:hover{transform:translateY(-1px)} button.action:disabled{opacity:.48;cursor:not-allowed;transform:none} .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.log{height:220px;overflow:auto;border:1px solid var(--line);border-radius:15px;padding:12px;background:#020617;color:#cbd5e1;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12.3px;line-height:1.52} .log .good{color:#86efac} .log .bad{color:#fca5a5} .log .warn{color:#fcd34d} .log .info{color:#93c5fd}
.deckbar{display:flex;gap:6px;flex-wrap:wrap;max-width:460px;justify-content:flex-end} .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12)} .dot.done{background:var(--green);border-color:rgba(34,197,94,.55)} .dot.active{background:var(--blue);border-color:rgba(37,99,235,.85);transform:scale(1.25)}
.result{display:none;margin-top:14px;border-radius:20px;border:1px solid rgba(134,239,172,.25);background:linear-gradient(135deg,rgba(34,197,94,.16),rgba(37,99,235,.13));padding:18px} .scorebig{font-size:54px;font-weight:950;letter-spacing:-.06em;line-height:1;margin:8px 0} .levelbox{margin-top:10px;padding:12px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.07);font-size:18px;font-weight:900} .cta{display:inline-block;margin-top:12px;color:white;text-decoration:none;font-weight:850;background:linear-gradient(135deg,var(--blue),var(--cyan));padding:12px 14px;border-radius:13px} .legend{display:flex;gap:10px;flex-wrap:wrap;color:#cbd5e1;font-size:12px;margin-top:8px} .legend span::before{content:"";display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;background:currentColor}
@media(max-width:1060px){header,main{display:block}.brandbox{margin-top:14px}.panel{margin-bottom:18px}.kpis{grid-template-columns:1fr 1fr}.charts{grid-template-columns:1fr}} @media(max-width:600px){.kpis{grid-template-columns:1fr}header,.toolbar,main{padding-left:14px;padding-right:14px}}
</style>
</head>
<body>
<header><div><h1 data-ui="title"></h1><p class="subtitle" data-ui="subtitle"></p></div><div class="brandbox"><strong data-ui="brand"></strong><span data-ui="claim"></span></div></header>
<div class="toolbar"><div class="selectwrap"><span data-ui="language"></span><select id="langSelect" onchange="setLanguage(this.value)"><option value="de">Deutsch</option><option value="en">English</option></select></div><div class="selectwrap"><span data-ui="mode"></span><select id="modeSelect" onchange="resetGame()"><option value="12" data-ui="sprint"></option><option value="40" data-ui="full"></option></select></div></div>
<main>
<section class="panel"><div class="panel-header"><div><h2 data-ui="dashboard"></h2><div class="small" data-ui="sub"></div></div><div class="pill"><span id="progressText"></span></div></div><div class="panel-body"><div class="kpis">
<div class="kpi"><label data-ui="cash"></label><div class="value" id="cashKpi"></div><div class="bar"><div class="fill" id="cashBar"></div></div><div class="small" id="cashSub"></div></div>
<div class="kpi"><label data-ui="risk"></label><div class="value" id="riskKpi"></div><div class="bar"><div class="fill" id="riskBar"></div></div><div class="small" data-ui="low"></div></div>
<div class="kpi"><label data-ui="forecast"></label><div class="value" id="forecastKpi"></div><div class="bar"><div class="fill" id="forecastBar"></div></div><div class="small">planning quality</div></div>
<div class="kpi"><label data-ui="bank"></label><div class="value" id="bankKpi"></div><div class="bar"><div class="fill" id="bankBar"></div></div><div class="small">funding trust</div></div>
<div class="kpi"><label data-ui="gov"></label><div class="value" id="govKpi"></div><div class="bar"><div class="fill" id="govBar"></div></div><div class="small">auditability</div></div></div>
<div class="charts"><div class="chartcard"><div class="charttitle"><span data-ui="cashTrend"></span><span class="pill" id="cashSignal"></span></div><canvas id="cashChart" width="560" height="240"></canvas><div class="legend"><span style="color:var(--cyan)">Cash</span><span style="color:var(--amber)">minimum buffer</span></div></div><div class="chartcard"><div class="charttitle"><span data-ui="control"></span><span class="pill" id="scorePill"></span></div><canvas id="qualityChart" width="560" height="240"></canvas><div class="legend"><span style="color:var(--green)">good</span><span style="color:var(--red)">risk</span></div></div></div></div></section>
<aside class="panel"><div class="panel-header"><h3 data-ui="decision"></h3><div class="deckbar" id="deckbar"></div></div><div class="panel-body"><div class="scenario"><div class="tag"><span data-ui="card"></span> #<span id="cardId"></span></div><h3 id="cardTitle"></h3><p id="cardSituation"></p></div><div class="choices" id="choices"></div><div class="controls"><button class="action" id="nextBtn" onclick="nextCard()" disabled data-ui="next"></button><button class="action secondary" onclick="resetGame()" data-ui="restart"></button></div>
<div class="result" id="resultBox"><h2 data-ui="finalTitle"></h2><div class="small" data-ui="finalScore"></div><div class="scorebig" id="finalScore"></div><div class="small" data-ui="level"></div><div class="levelbox" id="finalLevel"></div><h3 data-ui="recommendation"></h3><p id="finalReco"></p><a class="cta" href="#contact" data-ui="cta"></a></div>
<h3 style="margin:18px 0 10px" data-ui="log"></h3><div class="log" id="log"></div></div></aside>
</main>

let lang="de";let state;const minBuffer=650000;
function t(k){return UI[lang][k]} function money(v){const abs=Math.abs(v);const s="€ "+(abs/1e6).toLocaleString(lang==="de"?"de-DE":"en-US",{minimumFractionDigits:2,maximumFractionDigits:2})+"m";return v<0?"-"+s:s} function clamp(v,min,max){return Math.max(min,Math.min(max,v))} function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function defaultState(){const maxRounds=parseInt(document.getElementById("modeSelect")?.value||"12",10);return{deck:shuffle(CARDS).slice(0,maxRounds),idx:0,maxRounds,cash:1200000,risk:68,forecast:62,bank:58,gov:45,cashHistory:[1200000],selected:false,gameOver:false}}
function healthScore(){const cashScore=clamp((state.cash/1800000)*100,0,100);const riskScore=100-state.risk;return Math.round(cashScore*.26+riskScore*.24+state.forecast*.19+state.bank*.15+state.gov*.16)} function level(score=healthScore()){if(score>=85)return 4;if(score>=70)return 3;if(score>=55)return 2;if(score>=40)return 1;return 0} function levelText(s=healthScore()){return UI[lang].levelTexts[level(s)]} function recoText(s=healthScore()){return UI[lang].reco[level(s)]}
function setLanguage(x){lang=x;document.documentElement.lang=lang;renderTexts();renderCard();renderAll()} function renderTexts(){document.querySelectorAll("[data-ui]").forEach(el=>{const k=el.getAttribute("data-ui");if(UI[lang][k])el.textContent=UI[lang][k]});document.querySelectorAll("#modeSelect option").forEach(opt=>{const k=opt.getAttribute("data-ui");if(k&&UI[lang][k])opt.textContent=UI[lang][k]})}
function currentCard(){return state.deck[state.idx]} function impactPills(e){const labels={cash:{de:"Cash",en:"Cash"},risk:{de:"Risiko",en:"Risk"},forecast:{de:"Forecast",en:"Forecast"},bank:{de:"Bank",en:"Bank"},gov:{de:"Governance",en:"Governance"}};return Object.entries(e).map(([k,v])=>{const good=k==="risk"?v<0:v>0;const sign=v>0?"+":"";const val=k==="cash"?money(v):sign+v;return `<span class="pill ${good?"good":"bad"}">${labels[k][lang]}: ${val}</span>`}).join("")}
function renderCard(){if(!state||state.gameOver)return;const c=currentCard();document.getElementById("cardId").textContent=c.id;document.getElementById("cardTitle").textContent=c.title[lang];document.getElementById("cardSituation").textContent=c.situation[lang];document.getElementById("nextBtn").disabled=true;state.selected=false;const choices=document.getElementById("choices");choices.innerHTML="";c.options.forEach((o,i)=>{const b=document.createElement("button");b.className="choice";b.innerHTML=`<b>${i+1}. ${o.label[lang]}</b><span>${o.desc[lang]}</span><div class="impact">${impactPills(o.effects)}</div>`;b.onclick=()=>choose(o);choices.appendChild(b)})}
function choose(option){if(state.selected||state.gameOver)return;state.selected=true;document.querySelectorAll(".choice").forEach(b=>b.disabled=true);const e=option.effects;state.cash+=e.cash;state.risk=clamp(state.risk+e.risk,0,100);state.forecast=clamp(state.forecast+e.forecast,0,100);state.bank=clamp(state.bank+e.bank,0,100);state.gov=clamp(state.gov+e.gov,0,100);const operating=Math.round(90000+(state.forecast-60)*1800-(state.risk-50)*2200+(state.bank-55)*1200+(state.gov-45)*800);state.cash+=operating;if(state.cash<0){state.cash=0;state.risk=clamp(state.risk+12,0,100);state.bank=clamp(state.bank-6,0,100);log(t("emergency"),"bad")}state.cashHistory.push(state.cash);const card=currentCard();log(`${t("round")} ${state.idx+1}: <b>${card.title[lang]}</b> → ${option.label[lang]}`,"info");log(`${t("operating")}: ${money(operating)}`,operating>=0?"good":"warn");document.getElementById("nextBtn").disabled=false;renderAll()}
function nextCard(){if(state.idx>=state.maxRounds-1){endGame();return}state.idx++;renderCard();renderAll()} function endGame(){state.gameOver=true;const s=healthScore();document.getElementById("resultBox").style.display="block";document.getElementById("finalScore").textContent=s+"/100";document.getElementById("finalLevel").textContent=levelText(s);document.getElementById("finalReco").textContent=recoText(s);document.getElementById("nextBtn").disabled=true;document.querySelectorAll(".choice").forEach(b=>b.disabled=true);log(`${t("finalTitle")}. ${t("finalScore")}: <b>${s}/100</b>. ${t("level")}: <b>${levelText(s)}</b>`,s>=70?"good":"warn");renderAll()}

function renderAll(){renderKpis();renderDeckbar();drawCashChart();drawQualityChart()} function setBar(id,val,color){const el=document.getElementById(id);el.style.width=clamp(val,0,100)+"%";el.style.background=color} function renderKpis(){const score=healthScore();document.getElementById("cashKpi").textContent=money(state.cash);document.getElementById("riskKpi").textContent=state.risk;document.getElementById("forecastKpi").textContent=state.forecast+"%";document.getElementById("bankKpi").textContent=state.bank+"%";document.getElementById("govKpi").textContent=state.gov+"%";document.getElementById("cashSub").textContent=state.cash<minBuffer?t("critical"):t("buffer");document.getElementById("cashSignal").textContent=state.cash<minBuffer?t("critical"):t("stable");document.getElementById("scorePill").textContent=t("score")+": "+score+"/100";document.getElementById("progressText").textContent=`${state.idx+1}/${state.maxRounds} · ${state.idx} ${t("played")} · ${state.maxRounds-state.idx-1} ${t("remaining")}`;setBar("cashBar",state.cash/1800000*100,state.cash<minBuffer?"var(--red)":"linear-gradient(90deg,var(--cyan),var(--blue))");setBar("riskBar",state.risk,state.risk>70?"var(--red)":state.risk>45?"var(--amber)":"var(--green)");setBar("forecastBar",state.forecast,state.forecast<55?"var(--amber)":"linear-gradient(90deg,var(--green),var(--cyan))");setBar("bankBar",state.bank,state.bank<45?"var(--red)":"linear-gradient(90deg,var(--blue),var(--cyan))");setBar("govBar",state.gov,state.gov<45?"var(--amber)":"linear-gradient(90deg,var(--violet),var(--cyan))")}
function renderDeckbar(){const d=document.getElementById("deckbar");d.innerHTML="";for(let i=0;i<state.maxRounds;i++){const dot=document.createElement("div");dot.className="dot"+(i<state.idx?" done":i===state.idx?" active":"");d.appendChild(dot)}}
function prep(id){const c=document.getElementById(id);const ctx=c.getContext("2d");ctx.clearRect(0,0,c.width,c.height);return{c,ctx,w:c.width,h:c.height}} function drawGrid(ctx,w,h,pad){ctx.strokeStyle="rgba(255,255,255,.10)";ctx.lineWidth=1;for(let i=0;i<5;i++){const y=pad+i*(h-pad*2)/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}}
function drawCashChart(){const {ctx,w,h}=prep("cashChart");const pad=34;drawGrid(ctx,w,h,pad);const vals=state.cashHistory;const max=Math.max(2e6,...vals,minBuffer);const x=i=>pad+i*(w-pad*2)/(Math.max(state.maxRounds,vals.length-1));const y=v=>h-pad-(v/max)*(h-pad*2);ctx.strokeStyle="#f59e0b";ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(pad,y(minBuffer));ctx.lineTo(w-pad,y(minBuffer));ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle="#06b6d4";ctx.lineWidth=4;ctx.beginPath();vals.forEach((v,i)=>i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v)));ctx.stroke();vals.forEach((v,i)=>{ctx.fillStyle=v<minBuffer?"#ef4444":"#06b6d4";ctx.beginPath();ctx.arc(x(i),y(v),5,0,Math.PI*2);ctx.fill()});ctx.fillStyle="#cbd5e1";ctx.font="12px Arial";ctx.textAlign="left";ctx.fillText(money(vals[vals.length-1]),pad,18)}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()} function drawQualityChart(){const {ctx,w,h}=prep("qualityChart");const data=[[t("risk"),100-state.risk,"#ef4444"],[t("forecast"),state.forecast,"#06b6d4"],[t("bank"),state.bank,"#2563eb"],[t("gov"),state.gov,"#22c55e"],[t("score"),healthScore(),"#8b5cf6"]];const x0=150,y0=24,barH=25,gap=15,maxW=w-x0-50;ctx.font="12px Arial";data.forEach((d,i)=>{const y=y0+i*(barH+gap);ctx.fillStyle="#cbd5e1";ctx.textAlign="right";ctx.fillText(d[0],x0-12,y+17);ctx.fillStyle="rgba(255,255,255,.09)";roundRect(ctx,x0,y,maxW,barH,9);ctx.fill();ctx.fillStyle=d[2];roundRect(ctx,x0,y,maxW*d[1]/100,barH,9);ctx.fill();ctx.fillStyle="#e5e7eb";ctx.textAlign="left";ctx.fillText(Math.round(d[1])+"%",x0+maxW*d[1]/100+8,y+17)})}
